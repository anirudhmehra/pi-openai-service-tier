name: Bug report
description: Report a reproducible problem with pi-openai-service-tier
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: pi-version
    attributes:
      label: Pi version
      description: Run `pi --version`.
      placeholder: "0.72.1"
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version / commit
      description: If installed from git, include the commit shown in `~/.pi/agent/git/github.com/anirudhmehra/pi-openai-service-tier`.
      placeholder: "v0.1.1 / d84240b"
    validations:
      required: false
  - type: textarea
    id: config
    attributes:
      label: Config
      description: Paste `pi-openai-service-tier.json`, redacting anything sensitive if you added custom fields.
      render: json
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start pi with ...
        2. Run /fast on
        3. Send ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      render: text
    validations:
      required: true
